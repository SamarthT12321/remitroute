<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RemitRoute</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#f5f7fb;--ink2:#c7cfdb;--ink3:#8d98ab;
  --paper:#0b1020;--paper2:#121a2f;--paper3:#24304a;
  --green:#39d98a;--green-light:rgba(57,217,138,.12);
  --red:#ff6b81;--red-light:rgba(255,107,129,.12);
  --amber:#ffcc66;--amber-light:rgba(255,204,102,.14);
  --blue:#6ea8fe;--blue-light:rgba(110,168,254,.14);
  --accent:#8b5cf6;
  --font-serif:'DM Serif Display',serif;
  --font-sans:'Instrument Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
  --r:8px;--r2:16px;
}
body{font-family:var(--font-sans);background:radial-gradient(circle at top, #16213c 0%, #0b1020 45%, #070b16 100%);color:var(--ink);min-height:100vh;font-size:15px;line-height:1.5}

/* Layout */
.app{max-width:880px;margin:0 auto;padding:20px 16px 60px}
.header{text-align:center;padding:32px 0 40px;border-bottom:1px solid var(--paper3);margin-bottom:40px}
.logo{font-family:var(--font-serif);font-size:42px;letter-spacing:-1px;color:var(--ink);display:inline-flex;align-items:center;gap:10px}
.logo-dot{width:10px;height:10px;background:var(--accent);border-radius:50%;display:inline-block;margin-bottom:4px}
.tagline{color:var(--ink3);font-size:14px;margin-top:8px;letter-spacing:.3px}

/* Step indicator */
.steps{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:40px}
.step-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink3)}
.step-item.active{color:var(--ink);font-weight:500}
.step-item.done{color:var(--green)}
.step-num{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--paper3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;background:var(--paper);transition:all .3s}
.step-item.active .step-num{border-color:var(--accent);color:var(--accent)}
.step-item.done .step-num{border-color:var(--green);background:var(--green);color:#fff}
.step-line{width:40px;height:1px;background:var(--paper3);margin:0 4px}

/* Form */
.form-card{background:rgba(14,21,38,.92);backdrop-filter:blur(10px);border:1px solid var(--paper3);border-radius:20px;padding:32px;box-shadow:0 20px 50px rgba(0,0,0,.28)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.form-group{display:flex;flex-direction:column;gap:8px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:12px;font-weight:600;color:var(--ink2);letter-spacing:.5px;text-transform:uppercase}
.form-input,.form-select{width:100%;padding:12px 14px;border:1.5px solid var(--paper3);border-radius:var(--r);font-family:var(--font-sans);font-size:15px;color:var(--ink);background:#11192d;transition:border-color .2s, box-shadow .2s;outline:none;appearance:none;-webkit-appearance:none}
.form-input:focus,.form-select:focus{border-color:var(--accent);background:#11192d;box-shadow:0 0 0 3px rgba(139,92,246,.16)}
.amount-wrap{position:relative}
.amount-prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--ink3);font-size:15px;pointer-events:none}
.amount-wrap .form-input{padding-left:28px}

/* Priority toggles */
.priority-group{display:flex;gap:8px;flex-wrap:wrap}
.priority-btn{padding:8px 16px;border:1.5px solid var(--paper3);border-radius:20px;font-size:13px;background:#0f1528;color:var(--ink2);cursor:pointer;transition:all .2s;font-family:var(--font-sans)}
.priority-btn.active{border-color:var(--accent);color:#efe8ff;background:rgba(139,92,246,.18);font-weight:500;box-shadow:0 0 0 2px rgba(139,92,246,.08)}

/* NL Input */
.nl-bar{display:flex;gap:10px;margin-bottom:28px}
.nl-input{flex:1;padding:12px 16px;border:1.5px solid var(--paper3);border-radius:var(--r);font-family:var(--font-sans);font-size:14px;background:#11192d;color:var(--ink);outline:none;transition:border-color .2s, box-shadow .2s}
.nl-input:focus{border-color:var(--accent);background:#11192d;box-shadow:0 0 0 3px rgba(139,92,246,.16)}
.nl-label{font-size:12px;font-weight:600;color:var(--ink3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}

/* Buttons */
.btn-primary{padding:14px 32px;background:linear-gradient(135deg, var(--accent), #5b8cff);color:white;border:none;border-radius:var(--r);font-family:var(--font-sans);font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.2px;box-shadow:0 10px 24px rgba(91,140,255,.22)}
.btn-primary:hover{transform:translateY(-1px);filter:brightness(1.05)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{padding:10px 20px;background:#0f1528;color:var(--ink2);border:1.5px solid var(--paper3);border-radius:var(--r);font-family:var(--font-sans);font-size:14px;cursor:pointer;transition:all .2s}
.btn-secondary:hover{border-color:var(--accent);color:var(--ink)}
.btn-sm{padding:8px 16px;font-size:13px}

/* AI bar */
.ai-note{background:var(--blue-light);border:1px solid rgba(110,168,254,.34);border-radius:var(--r);padding:12px 16px;font-size:13px;color:#cfe0ff;margin-bottom:24px;display:flex;gap:10px;align-items:flex-start;line-height:1.5}
.ai-badge{font-size:11px;font-weight:600;background:var(--blue);color:white;padding:2px 8px;border-radius:4px;flex-shrink:0;margin-top:1px;letter-spacing:.5px}

/* Results */
.results-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px}
.results-title{font-family:var(--font-serif);font-size:28px}
.results-sub{font-size:13px;color:var(--ink3);margin-top:4px}
.corridor-badge{font-size:12px;background:var(--paper2);padding:6px 12px;border-radius:20px;color:var(--ink2);font-weight:500}

.result-card{background:linear-gradient(180deg, rgba(16,24,44,.96), rgba(11,17,31,.96));border:1px solid var(--paper3);border-radius:20px;padding:24px;margin-bottom:12px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;box-shadow:0 10px 28px rgba(0,0,0,.2)}
.result-card:hover{border-color:#4d5d82;box-shadow:0 18px 34px rgba(0,0,0,.28);transform:translateY(-1px)}
.result-card.best{border-color:var(--green);box-shadow:0 0 0 2px rgba(26,92,58,.12)}
.result-card.best::before{content:'BEST ROUTE';position:absolute;top:0;right:0;background:var(--green);color:white;font-size:10px;font-weight:600;padding:4px 10px;letter-spacing:.8px;border-radius:0 var(--r2) 0 var(--r)}
.result-card.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(212,98,42,.12)}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.provider-name{font-family:var(--font-serif);font-size:22px;color:var(--ink)}
.provider-method{font-size:12px;color:var(--ink3);margin-top:3px;font-family:var(--font-mono)}
.payout-big{text-align:right}
.payout-amount{font-family:var(--font-mono);font-size:28px;font-weight:500;color:var(--green)}
.payout-label{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

.cost-breakdown{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 0;border-top:1px solid var(--paper2);border-bottom:1px solid var(--paper2);margin:12px 0}
.cost-item{text-align:center}
.cost-val{font-family:var(--font-mono);font-size:14px;font-weight:500}
.cost-val.good{color:var(--green)}
.cost-val.warn{color:var(--amber)}
.cost-val.bad{color:var(--red)}
.cost-lbl{font-size:11px;color:var(--ink3);margin-top:3px;text-transform:uppercase;letter-spacing:.4px}

.loss-bar-wrap{margin:12px 0 0}
.loss-bar-label{display:flex;justify-content:space-between;font-size:12px;color:var(--ink3);margin-bottom:6px}
.loss-bar{height:8px;background:var(--paper2);border-radius:4px;overflow:hidden;display:flex}
.loss-fee{background:#d4a464;border-radius:4px 0 0 4px;height:100%;transition:width .5s}
.loss-fx{background:var(--red);height:100%;border-radius:0 4px 4px 0}
.loss-you{background:var(--green);height:100%}

.tags{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.tag{font-size:11px;padding:4px 10px;border-radius:12px;font-weight:500;letter-spacing:.2px}
.tag-speed{background:var(--blue-light);color:var(--blue)}
.tag-fee{background:var(--green-light);color:var(--green)}
.tag-slow{background:var(--amber-light);color:var(--amber)}
.tag-warn{background:var(--red-light);color:var(--red)}

/* Receipt */
.receipt{background:linear-gradient(180deg, rgba(18,26,47,.98), rgba(9,13,24,.98));border:1px solid var(--paper3);border-radius:20px;padding:32px;max-width:520px;margin:0 auto;box-shadow:0 20px 50px rgba(0,0,0,.28)}
.receipt-header{text-align:center;padding-bottom:24px;border-bottom:2px dashed var(--paper3)}
.receipt-logo{font-family:var(--font-serif);font-size:24px;color:var(--ink);letter-spacing:-0.5px}
.receipt-title{font-size:13px;color:var(--ink3);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.receipt-body{padding:24px 0}
.receipt-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:14px}
.receipt-row.divider{border-top:1px solid var(--paper2);margin-top:8px;padding-top:16px}
.receipt-row.total{border-top:2px solid var(--ink);margin-top:8px;padding-top:16px;font-size:16px;font-weight:600}
.receipt-lbl{color:var(--ink3)}
.receipt-val{font-family:var(--font-mono);font-weight:500}
.receipt-val.loss{color:var(--red)}
.receipt-val.gain{color:var(--green)}
.receipt-val.bold{font-size:18px;color:var(--ink)}

.receipt-footer{text-align:center;padding-top:24px;border-top:2px dashed var(--paper3);font-size:12px;color:var(--ink3)}

.money-lost-box{background:var(--red-light);border:1px solid rgba(255,107,129,.34);border-radius:var(--r);padding:16px;text-align:center;margin:20px 0}
.money-lost-num{font-family:var(--font-mono);font-size:32px;font-weight:500;color:var(--red)}
.money-lost-lbl{font-size:13px;color:var(--red);margin-top:4px}

.action-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:28px}

/* Loading */
.loading{text-align:center;padding:60px 0}
.loading-spinner{width:40px;height:40px;border:2px solid var(--paper3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:14px;color:var(--ink3)}

/* Utility */
.flex{display:flex}.gap-12{gap:12px}.mt-8{margin-top:8px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}
.text-center{text-align:center}.w-full{width:100%}


.preset-row{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 18px}
.preset-chip{padding:8px 12px;border-radius:999px;border:1px solid var(--paper3);background:#0f1528;color:var(--ink2);font-size:12px;cursor:pointer;transition:all .2s}
.preset-chip:hover{border-color:var(--accent);color:var(--ink)}
.hero-panel{display:grid;grid-template-columns:1.3fr .9fr;gap:18px;margin-bottom:20px}
.hero-card,.insight-card,.compare-card,.metric-card{background:rgba(14,21,38,.88);border:1px solid var(--paper3);border-radius:20px;padding:18px;box-shadow:0 10px 28px rgba(0,0,0,.18)}
.hero-kicker{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink3);margin-bottom:8px}
.hero-head{font-family:var(--font-serif);font-size:30px;line-height:1.1;margin-bottom:8px}
.hero-copy{color:var(--ink2);font-size:14px}
.quick-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat-tile{padding:14px;border-radius:16px;background:#10182d;border:1px solid var(--paper3)}
.stat-k{font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--ink3)}
.stat-v{font-family:var(--font-mono);font-size:20px;margin-top:4px}
.top-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:0 0 18px}
.metric-label{font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--ink3)}
.metric-value{font-family:var(--font-mono);font-size:24px;margin:6px 0 4px}
.metric-sub{font-size:12px;color:var(--ink2)}
.results-grid{display:grid;grid-template-columns:1.4fr .9fr;gap:18px;align-items:start}
.side-stack{display:flex;flex-direction:column;gap:14px}
.provider-avatar{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg, rgba(139,92,246,.4), rgba(91,140,255,.35));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;border:1px solid rgba(255,255,255,.08)}
.provider-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.compare-list{display:flex;flex-direction:column;gap:10px}
.compare-item{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:10px 12px;background:#10182d;border:1px solid var(--paper3);border-radius:14px}
.bar-track{height:8px;background:#0b1122;border-radius:999px;overflow:hidden}
.bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg, var(--accent), #5b8cff)}
.checklist{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.check-item{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;background:#10182d;border:1px solid var(--paper3);border-radius:14px;color:var(--ink2);font-size:13px}
.check-dot{width:20px;height:20px;border-radius:50%;background:rgba(57,217,138,.18);color:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px}
.live-pill{background:#0f1528;border:1px solid var(--paper3);padding:8px 12px;border-radius:999px;color:var(--ink2);font-size:12px;display:inline-flex;align-items:center;gap:8px}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green)}
.share-box{padding:14px;border-radius:16px;background:#10182d;border:1px solid var(--paper3);display:flex;flex-direction:column;gap:10px}
.share-input{width:100%;padding:10px 12px;border:1px solid var(--paper3);border-radius:12px;background:#0b1122;color:var(--ink);font-size:12px}
.section-title{font-family:var(--font-serif);font-size:22px;margin-bottom:10px}
.score-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:rgba(57,217,138,.12);border:1px solid rgba(57,217,138,.24);font-size:12px;color:var(--green);margin-top:10px}
.small-note{font-size:12px;color:var(--ink3)}
@media(max-width:900px){.hero-panel,.results-grid{grid-template-columns:1fr}.top-metrics{grid-template-columns:repeat(2,1fr)}}

@media(max-width:600px){
  .form-grid{grid-template-columns:1fr}
  .cost-breakdown{grid-template-columns:repeat(2,1fr)}
  .form-group.full{grid-column:1}
}

.live-pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid #cfe0d5;background:#f4fbf7;border-radius:999px;font-size:12px;color:var(--green);font-weight:600}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.top-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:0 0 20px}
.metric-card{background:white;border:1px solid var(--paper3);border-radius:14px;padding:16px}
.metric-label{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.metric-value{font-size:22px;font-family:var(--font-mono);font-weight:500}
.metric-sub{font-size:12px;color:var(--ink3);margin-top:4px}
.provider-head{display:flex;align-items:center;gap:12px}
.provider-avatar{width:42px;height:42px;border-radius:12px;background:var(--paper2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;letter-spacing:.4px}
.provider-rank{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px}
.insight-strip{background:linear-gradient(180deg,#fff8f2,#fff);border:1px solid #f2d2bf;border-radius:var(--r2);padding:16px 18px;margin:0 0 16px}
.insight-title{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.warning-box{background:var(--amber-light);border:1px solid #ead49a;border-radius:12px;padding:12px 14px;font-size:13px;color:var(--amber);margin:0 0 14px}
.success-box{background:var(--green-light);border:1px solid #b8ddc4;border-radius:12px;padding:12px 14px;font-size:13px;color:var(--green);margin:0 0 14px}
.history-panel{background:white;border:1px solid var(--paper3);border-radius:var(--r2);padding:20px;margin:18px 0 22px}
.history-title{font-family:var(--font-serif);font-size:22px;margin-bottom:6px}
.history-sub{font-size:13px;color:var(--ink3);margin-bottom:16px}
.bar-list{display:flex;flex-direction:column;gap:10px}
.bar-row{display:grid;grid-template-columns:120px 1fr 70px;gap:12px;align-items:center}
.bar-label{font-size:13px;font-weight:600}
.bar-track{height:12px;background:var(--paper2);border-radius:999px;overflow:hidden}
.bar-fill{height:100%;background:var(--blue)}
.bar-val{font-size:12px;color:var(--ink3);text-align:right}
.mini-note{font-size:12px;color:var(--ink3);margin-top:12px}
.share-note{background:var(--paper2);border:1px dashed var(--paper3);border-radius:12px;padding:12px 14px;font-size:12px;color:var(--ink2);margin-top:12px;word-break:break-all}
@media(max-width:700px){.top-metrics{grid-template-columns:repeat(2,1fr)}.bar-row{grid-template-columns:90px 1fr 54px}}


/* ===== Improved dark summary cards ===== */
.stat-card,
.summary-card,
.metric-card,
.top-card,
.kpi-card {
  background: linear-gradient(180deg,#0f172a 0%,#020617 100%) !important;
  border: 1px solid #1e293b !important;
  color: #e2e8f0 !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.35);
}

.stat-card *,
.summary-card *,
.metric-card *,
.top-card *,
.kpi-card *{
  color:#e2e8f0 !important;
}

.stat-card:hover,
.summary-card:hover,
.metric-card:hover,
.top-card:hover,
.kpi-card:hover{
  border-color:#22c55e !important;
  transform:translateY(-2px);
}

</style>
</head>
<body>
<div class="app" id="root"></div>

<script>
// ============================================================
// DATA LAYER: Providers, Corridors, Fee Structures
// ============================================================
const CORRIDORS = {
  'US-MX': { from:'United States 🇺🇸', to:'Mexico 🇲🇽', currency:'MXN', symbol:'MX$', midRate:17.18, flag:'🇲🇽' },
  'US-PH': { from:'United States 🇺🇸', to:'Philippines 🇵🇭', currency:'PHP', symbol:'₱', midRate:57.42, flag:'🇵🇭' },
  'US-NG': { from:'United States 🇺🇸', to:'Nigeria 🇳🇬', currency:'NGN', symbol:'₦', midRate:1612.50, flag:'🇳🇬' },
  'US-IN': { from:'United States 🇺🇸', to:'India 🇮🇳', currency:'INR', symbol:'₹', midRate:83.94, flag:'🇮🇳' },
  'UK-NG': { from:'United Kingdom 🇬🇧', to:'Nigeria 🇳🇬', currency:'NGN', symbol:'₦', midRate:2020.00, flag:'🇳🇬' },
  'UK-IN': { from:'United Kingdom 🇬🇧', to:'India 🇮🇳', currency:'INR', symbol:'₹', midRate:105.80, flag:'🇮🇳' },
  'US-PK': { from:'United States 🇺🇸', to:'Pakistan 🇵🇰', currency:'PKR', symbol:'₨', midRate:278.65, flag:'🇵🇰' },
  'US-BD': { from:'United States 🇺🇸', to:'Bangladesh 🇧🇩', currency:'BDT', symbol:'৳', midRate:117.35, flag:'🇧🇩' },
  'US-VN': { from:'United States 🇺🇸', to:'Vietnam 🇻🇳', currency:'VND', symbol:'₫', midRate:25420.00, flag:'🇻🇳' },
  'US-CN': { from:'United States 🇺🇸', to:'China 🇨🇳', currency:'CNY', symbol:'¥', midRate:7.24, flag:'🇨🇳' },
  'US-BR': { from:'United States 🇺🇸', to:'Brazil 🇧🇷', currency:'BRL', symbol:'R$', midRate:5.08, flag:'🇧🇷' },
  'US-GH': { from:'United States 🇺🇸', to:'Ghana 🇬🇭', currency:'GHS', symbol:'GH₵', midRate:15.22, flag:'🇬🇭' },
  'UK-PK': { from:'United Kingdom 🇬🇧', to:'Pakistan 🇵🇰', currency:'PKR', symbol:'₨', midRate:356.70, flag:'🇵🇰' },
  'UK-BD': { from:'United Kingdom 🇬🇧', to:'Bangladesh 🇧🇩', currency:'BDT', symbol:'৳', midRate:150.40, flag:'🇧🇩' },

const PROVIDERS = {
  'Wise': {
    color:'#163300',
    getQuote(amount, corridor, method) {
      const r = CORRIDORS[corridor];
      const feeFixed = amount < 200 ? 3.99 : amount < 1000 ? 6.49 : 9.99;
      const feePct = 0.0067;
      const totalFee = feeFixed + amount * feePct;
      const fxSpread = 0.0000; // Wise uses mid-market
      const rate = r.midRate * (1 - fxSpread);
      const payout = (amount - totalFee) * rate;
      const speeds = {bank:'1-2 days',card:'Minutes',cash:'N/A'};
      return { provider:'Wise', method, fee:totalFee, fxSpread:0, rate, payout, speed:speeds[method]||'1-2 days', available:method!=='cash' };
    }
  },
  'Remitly': {
    getQuote(amount, corridor, method) {
      const r = CORRIDORS[corridor];
      const feeFixed = method==='cash'? 3.99 : amount < 500 ? 2.99 : 0;
      const fxSpread = method==='express' ? 0.015 : 0.022;
      const rate = r.midRate * (1 - fxSpread);
      const totalFee = feeFixed;
      const payout = (amount - totalFee) * rate;
      const speeds = {bank:'3-5 days',cash:'Minutes',express:'Minutes'};
      return { provider:'Remitly', method:method==='express'?'Express':'Economy', fee:totalFee, fxSpread, rate, payout, speed:speeds[method]||'3-5 days', available:true };
    }
  },
  'Western Union': {
    getQuote(amount, corridor, method) {
      const r = CORRIDORS[corridor];
      const feeFixed = method==='cash' ? 4.99 : 5.99;
      const feePct = 0.01;
      const fxSpread = 0.030;
      const rate = r.midRate * (1 - fxSpread);
      const totalFee = feeFixed + amount * feePct;
      const payout = (amount - totalFee) * rate;
      return { provider:'Western Union', method:method==='cash'?'Cash Pickup':'Bank Deposit', fee:totalFee, fxSpread, rate, payout, speed:method==='cash'?'Minutes':'1-3 days', available:true };
    }
  },
  'MoneyGram': {
    getQuote(amount, corridor, method) {
      const r = CORRIDORS[corridor];
      const feeFixed = method==='cash' ? 3.99 : 4.49;
      const fxSpread = 0.028;
      const rate = r.midRate * (1 - fxSpread);
      const totalFee = feeFixed;
      const payout = (amount - totalFee) * rate;
      return { provider:'MoneyGram', method:method==='cash'?'Cash Pickup':'Bank Transfer', fee:totalFee, fxSpread, rate, payout, speed:method==='cash'?'Minutes':'2-4 days', available:true };
    }
  },
  'WorldRemit': {
    getQuote(amount, corridor, method) {
      const r = CORRIDORS[corridor];
      const feeFixed = amount < 300 ? 3.99 : 0;
      const fxSpread = 0.018;
      const rate = r.midRate * (1 - fxSpread);
      const totalFee = feeFixed;
      const payout = (amount - totalFee) * rate;
      return { provider:'WorldRemit', method:method==='mobile'?'Mobile Money':'Bank', fee:totalFee, fxSpread, rate, payout, speed:'2-3 days', available:!['UK-NG','US-CN'].includes(corridor) };
    }
  },
  'PaySend': {
    getQuote(amount, corridor, method) {
      const r = CORRIDORS[corridor];
      const feeFixed = 2.00;

      const rate = r.midRate * (1 - fxSpread);
      const payout = (amount - feeFixed) * rate;
      return { provider:'PaySend', method:'Card to Card', fee:feeFixed, fxSpread, rate, payout, speed:'Minutes', available:corridor.startsWith('UK') || ['US-PK','US-BD','US-PH'].includes(corridor) };
    }
  }
};


function providerBadge(name){
  return name.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
}

function speedToMinutes(speed){
  if(speed.includes('Minute')) return 5;
  if(speed.includes('1-2')) return 2160;
  if(speed.includes('1-3')) return 2880;
  if(speed.includes('2-3')) return 3600;
  if(speed.includes('2-4')) return 4320;
  if(speed.includes('3-5')) return 5760;
  return 2500;
}

function scoreQuote(q, priority){
  const payoutScore = q.payout;
  const speedPenalty = speedToMinutes(q.speed) / 40;
  const feePenalty = q.fee * 11;
  const fxPenalty = q.fxSpread * 2200;
  if(priority==='speed') return payoutScore - speedPenalty - feePenalty*0.4 - fxPenalty*0.4;
  if(priority==='cost') return payoutScore - feePenalty - fxPenalty;
  return payoutScore - speedPenalty*0.6 - feePenalty*0.75 - fxPenalty*0.75;
}

function frequencyMultiplier(freq){
  return ({once:1, weekly:52, monthly:12, yearly:1}[freq] || 1);
}

async function refreshLiveRates(){
  const corridor = CORRIDORS[state.form.corridor];
  const base = state.form.corridor.startsWith('UK') ? 'GBP' : 'USD';
  try {
    const res = await fetch(`https://open.er-api.com/v6/latest/${base}`);
    const data = await res.json();
    const live = data?.rates?.[corridor.currency];
    if(live && Number.isFinite(live)){
      CORRIDORS[state.form.corridor].midRate = Number(live.toFixed(4));
      state.fxStatus = 'Live FX loaded';
      state.lastUpdated = new Date().toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
      return true;
    }
    throw new Error('Missing live rate');
  } catch(e){
    state.fxStatus = 'Live FX unavailable — using benchmark rates';
    state.lastUpdated = '';
    return false;
  }
}

function analyzeProviderPerformance(corridor){
  const samples = [100,300,500,1000];
  const wins = {};
  const avgGap = {};
  Object.keys(PROVIDERS).forEach(p => { wins[p]=0; avgGap[p]=[]; });
  for(const amount of samples){
    const ranked = getQuotes(amount, corridor, 'balanced');
    const best = ranked[0]?.payout || 0;
    ranked.forEach((q, idx) => {
      if(idx===0) wins[q.provider] += 1;
      avgGap[q.provider].push(best - q.payout);
    });
  }
  return Object.keys(PROVIDERS).map(name => {
    const avgLossVsBest = avgGap[name].length ? avgGap[name].reduce((a,b)=>a+b,0)/avgGap[name].length : 999999;
    const consistency = Math.max(0, 100 - avgLossVsBest/2.5 - (4 - wins[name])*7);
    return {
      provider:name,
      wins:wins[name],
      consistency: Math.round(consistency)
    };
  }).sort((a,b)=>b.consistency-a.consistency);
}


function providerInitials(name){
  return name.split(' ').map(x => x[0]).join('').slice(0,2).toUpperCase();
}

function corridorSnapshot(corridor, amount){
  const ranked = getQuotes(amount, corridor, 'balanced');
  const best = ranked[0];
  const worst = ranked[ranked.length-1];
  if(!best || !worst) return null;
  return {
    bestProvider: best.provider,
    spread: Math.max(0, best.payout - worst.payout),
    hiddenCost: Math.max(0, (worst.fee + worst.fxSpread * amount) - (best.fee + best.fxSpread * amount)),
    confidence: best.fxSpread === 0 ? 'High confidence' : (best.speed.includes('Minute') ? 'Fast but costlier corridor' : 'Balanced corridor')
  };
}

function buildDecisionChecklist(best, corridor, amount){
  const baseCurrency = corridor.startsWith('UK') ? 'GBP' : 'USD';
  const fxLeak = best.fxSpread * amount;
  return [
    `${best.provider} wins on total decision score for this ${baseCurrency} ${amount} transfer.`,
    `Estimated explicit fee is ${baseCurrency === 'GBP' ? '£' : '$'}${best.fee.toFixed(2)} and FX leakage is ${(fxLeak).toFixed(2)} ${baseCurrency}.`,
    `Expected delivery speed is ${best.speed}, which matches your ${state.form.priority} priority setting.`
  ];
}

function applyPreset(preset){
  state.form.amount = String(preset.amount);
  state.form.corridor = preset.corridor;
  state.form.priority = preset.priority;
  state.form.frequency = preset.frequency;
  state.nlText = preset.label;
  syncShareURL();
  render();
}

function getQuotes(amount, corridor, priority) {
  const methods = {cost:['bank','economy'],speed:['express','cash','card'],balanced:['bank','cash']};
  const use = methods[priority] || ['bank','cash'];
  const results = [];
  for(const [name, p] of Object.entries(PROVIDERS)) {
    for(const m of use) {
      try {
        const q = p.getQuote(amount, corridor, m);
        if(q.available && q.payout > 0) results.push(q);
      } catch(e){}
    }
  }
  // Deduplicate by provider
  const seen = new Set();
  const deduped = results.filter(r => { if(seen.has(r.provider)) return false; seen.add(r.provider); return true; });
  return deduped.sort((a,b)=>scoreQuote(b, priority)-scoreQuote(a, priority));
}

async function getAIRecommendation(params, quotes) {
  const top3 = quotes.slice(0,3).map(q => ({
    provider: q.provider,
    fee: q.fee.toFixed(2),
    fxSpread: (q.fxSpread*100).toFixed(1)+'%',
    payout: q.payout.toFixed(0) + ' ' + CORRIDORS[params.corridor].currency,
    speed: q.speed
  }));

  const prompt = `You are a remittance expert. A user is sending $${params.amount} USD via the ${params.corridor.replace('-','→')} corridor. Their priority is: ${params.priority}.

Top 3 providers ranked by recipient payout:
${top3.map((q,i)=>`${i+1}. ${q.provider}: payout ${q.payout}, fee $${q.fee}, FX spread ${q.fxSpread}, speed ${q.speed}`).join('\n')}

Write a 2-sentence plain English recommendation explaining which provider to use and WHY given their priority of "${params.priority}". Be specific about dollars saved or speed gained. Then add one short sentence about the biggest hidden cost to watch for. Keep it under 80 words total. No markdown.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:200,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await res.json();
    return data.content?.[0]?.text || null;
  } catch(e) { return null; }
}

async function parseNL(text) {
  const prompt = `Parse this remittance request and return ONLY valid JSON (no markdown): "${text}"
Return: {"amount": number or null, "corridor": one of ${Object.keys(CORRIDORS).join(', ')} or null, "priority": "cost"|"speed"|"balanced"}
If corridor can't be determined, return null for it.`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:120, messages:[{role:'user',content:prompt}] })
    });
    const data = await res.json();
    const txt = data.content?.[0]?.text || '{}';
    return JSON.parse(txt.replace(/```json|```/g,'').trim());
  } catch(e) { return {}; }
}

      <div class="small-note">${p.consistency}%</div>
    </div>`).join('');

  const checklistHTML = checklist.map(item => `<div class="check-item"><div class="check-dot">✓</div><div>${item}</div></div>`).join('');

  return `
  <div class="results-header">
    <div>
      <div class="results-title">Send ${baseCurrency === 'GBP' ? '£' : '$'}${state.form.amount}</div>
      <div class="results-sub">${cor.from} → ${cor.to} · Mid-market rate: 1 ${baseCurrency} = ${cor.midRate} ${cor.currency}</div>
    </div>
    <button class="btn-secondary btn-sm" id="back-btn">← Edit</button>
  </div>
  ${topMetrics}
  ${aiSection}
  <div class="results-grid">
    <div>
      ${cards}
    </div>
    <div class="side-stack">
      <div class="insight-card">
        <div class="section-title">Corridor intelligence</div>
        <div class="small-note">${snapshot?.confidence || 'Modeled corridor snapshot'}</div>
        <div class="checklist" style="margin-top:12px">
          <div class="check-item"><div class="check-dot">•</div><div>Best current route: <strong>${snapshot?.bestProvider || '—'}</strong></div></div>
          <div class="check-item"><div class="check-dot">•</div><div>Best vs worst payout gap: <strong>${cor.symbol}${Math.round(snapshot?.spread || 0).toLocaleString()}</strong></div></div>
          <div class="check-item"><div class="check-dot">•</div><div>Potential hidden-cost reduction: <strong>${baseCurrency === 'GBP' ? '£' : '$'}${Math.round(snapshot?.hiddenCost || 0)}</strong></div></div>
        </div>
      </div>
      <div class="compare-card">
        <div class="section-title">Why this route wins</div>
        <div class="checklist">${checklistHTML}</div>
      </div>
      <div class="compare-card">
        <div class="section-title">Provider consistency</div>
        <div class="small-note">Modeled across sample transfer sizes on this corridor.</div>
        <div class="compare-list" style="margin-top:12px">${performanceList}</div>
      </div>
      <div class="share-box">
        <div class="section-title" style="font-size:18px;margin-bottom:0">Shareable setup</div>
        <input class="share-input" id="share-url" value="${state.shareURL}" readonly>
        <button class="btn-secondary" id="copy-setup-btn">Copy link</button>
      </div>
    </div>
  </div>
  <div class="text-center mt-24">
    <button class="btn-primary" id="receipt-btn" ${state.selected===null?'disabled':''}>Generate cost receipt →</button>
    <div style="font-size:12px;color:var(--ink3);margin-top:8px">Select a provider above to generate your receipt</div>
  </div>`;
}

function buildReceipt() {
  const q = state.quotes[state.selected || 0];
  const cor = CORRIDORS[state.form.corridor];
  const amount = Number(state.form.amount);
  const baseCurrency = state.form.corridor.startsWith('UK') ? 'GBP' : 'USD';
  const fxLoss = q.fxSpread * amount;
  const totalLoss = q.fee + fxLoss;
  const annualizedLoss = totalLoss * frequencyMultiplier(state.form.frequency);
  const betterRouteGain = state.quotes[0].payout - q.payout;
  const date = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  return `
  <div class="text-center mt-16">
    <div class="receipt" id="receipt-card">
      <div class="receipt-header">
        <div class="receipt-logo">● RemitRoute</div>
        <div class="receipt-title">Transfer Cost Receipt</div>
        <div style="font-size:12px;color:var(--ink3);margin-top:8px">${date} · ${cor.from} → ${cor.to}</div>
      </div>
      <div class="receipt-body">
        <div class="receipt-row"><span class="receipt-lbl">You send</span><span class="receipt-val bold">${baseCurrency === 'GBP' ? '£' : '$'}${amount.toFixed(2)} ${baseCurrency}</span></div>
        <div class="receipt-row"><span class="receipt-lbl">Provider</span><span class="receipt-val">${q.provider} (${q.method})</span></div>
        <div class="receipt-row"><span class="receipt-lbl">Exchange rate</span><span class="receipt-val">1 ${baseCurrency} = ${q.rate.toFixed(4)} ${cor.currency}</span></div>
        <div class="receipt-row"><span class="receipt-lbl">Mid-market rate</span><span class="receipt-val">${cor.midRate.toFixed(4)} ${cor.currency}</span></div>
        <div class="receipt-row"><span class="receipt-lbl">Delivery speed</span><span class="receipt-val">${q.speed}</span></div>
        <div class="receipt-row divider"><span class="receipt-lbl">Transfer fee</span><span class="receipt-val loss">−$${q.fee.toFixed(2)}</span></div>
        <div class="receipt-row"><span class="receipt-lbl">FX spread cost</span><span class="receipt-val loss">−$${fxLoss.toFixed(2)}</span></div>
        <div class="receipt-row"><span class="receipt-lbl">Projected annualized leakage</span><span class="receipt-val loss">−$${annualizedLoss.toFixed(2)}</span></div>
        <div class="receipt-row"><span class="receipt-lbl" style="font-weight:600">Total cost to you</span><span class="receipt-val loss" style="font-size:15px">−$${totalLoss.toFixed(2)}</span></div>
        <div class="receipt-row total"><span>Recipient gets</span><span class="receipt-val gain">${cor.symbol}${Math.round(q.payout).toLocaleString()} ${cor.currency}</span></div>
      </div>
      <div class="money-lost-box">
        <div class="money-lost-num">$${totalLoss.toFixed(2)}</div>
        <div class="money-lost-lbl">lost to fees & FX spread on this transfer</div>
      </div>
      ${betterRouteGain > 1 ? `<div style="background:var(--amber-light);border:1px solid #ead49a;border-radius:var(--r);padding:14px;text-align:center;margin-bottom:16px;font-size:13px;color:var(--amber)">
        ⚠ The top-ranked route would get your recipient ${cor.symbol}${Math.round(betterRouteGain).toLocaleString()} more right now
      </div>` : `<div style="background:var(--green-light);border:1px solid #b8ddc4;border-radius:var(--r);padding:14px;text-align:center;margin-bottom:16px;font-size:13px;color:var(--green)">
        ✓ You selected the strongest route for your chosen priority
      </div>`}
      <div class="receipt-footer">
        <div>Frequency modeled: ${state.form.frequency}</div>
        <div style="margin-top:6px">Generated by RemitRoute · remitroute.io</div>
        <div style="margin-top:4px;font-style:italic">Rates are indicative. Verify before sending.</div>
      </div>
    </div>
    <div class="action-row">
      <button class="btn-secondary" id="back-results-btn">← Back to results</button>
      <button class="btn-secondary" id="copy-link-btn">Copy share link</button>
      <button class="btn-primary" id="share-btn">Copy receipt text</button>
    </div>
    <div class="share-note">${state.shareURL}</div>
  </div>`;
}

// ============================================================
// EVENTS
// ============================================================
function bindEvents() {
  const presets = {
    family:{label:'Send monthly support to family in India', amount:500, corridor:'US-IN', priority:'cost', frequency:'monthly'},
    urgent:{label:'Emergency cash pickup to Nigeria', amount:250, corridor:'US-NG', priority:'speed', frequency:'once'},
    salary:{label:'Monthly salary transfer to Philippines', amount:1200, corridor:'UK-PH', priority:'balanced', frequency:'monthly'},
    student:{label:'Student expense transfer to Bangladesh', amount:350, corridor:'US-BD', priority:'cost', frequency:'monthly'}
  };
  document.querySelectorAll('.preset-chip').forEach(btn => {
    btn.addEventListener('click', ()=>{ const preset = presets[btn.dataset.preset]; if(preset) applyPreset(preset); });
  });

  document.querySelectorAll('.priority-btn').forEach(btn => {
    btn.addEventListener('click', ()=>{
      state.form.priority = btn.dataset.priority;
      syncShareURL();
      render();
    });
  });

  const nlBtn = document.getElementById('nl-btn');
  if(nlBtn) nlBtn.addEventListener('click', async ()=>{
    const txt = document.getElementById('nl-input').value.trim();
    if(!txt) return;
    state.nlText = txt;
    state.nlParsing = true;
    render();
    const parsed = await parseNL(txt);
    state.nlParsing = false;
    if(parsed.amount) state.form.amount = String(parsed.amount);
    if(parsed.corridor) state.form.corridor = parsed.corridor;
    if(parsed.priority) state.form.priority = parsed.priority;
    syncShareURL();
    render();
  });

  const amtEl = document.getElementById('amount');
  if(amtEl) amtEl.addEventListener('change', ()=>{ state.form.amount = amtEl.value; syncShareURL(); });
  const corEl = document.getElementById('corridor');
  if(corEl) corEl.addEventListener('change', async ()=>{
    state.form.corridor = corEl.value;
    await refreshLiveRates();
    syncShareURL();
    render();
  });
  const freqEl = document.getElementById('frequency');
  if(freqEl) freqEl.addEventListener('change', ()=>{
    state.form.frequency = freqEl.value;
    syncShareURL();
  });

  document.querySelectorAll('#copy-link-btn').forEach(btn => {
    btn.addEventListener('click', ()=>{
      syncShareURL();
      navigator.clipboard.writeText(state.shareURL).catch(()=>{});
      btn.textContent = 'Copied link! ✓';
      setTimeout(()=>{ btn.textContent = 'Copy share link'; }, 1800);
    });
  });

  const cmpBtn = document.getElementById('compare-btn');
  if(cmpBtn) cmpBtn.addEventListener('click', async ()=>{
    state.form.amount = document.getElementById('amount')?.value || state.form.amount;
    state.form.corridor = document.getElementById('corridor')?.value || state.form.corridor;
    state.form.frequency = document.getElementById('frequency')?.value || state.form.frequency;
    syncShareURL();
    state.step = 2;
    state.selected = null;
    state.aiNote = '';
    render();
    await refreshLiveRates();
    await new Promise(r=>setTimeout(r, 700));
    state.quotes = getQuotes(Number(state.form.amount), state.form.corridor, state.form.priority);
    state.step = 3;
    state.aiLoading = true;
    render();
    const note = await getAIRecommendation(state.form, state.quotes);
    state.aiNote = note || `Best route right now is ${state.quotes[0]?.provider || 'the top-ranked provider'} because it balances recipient payout, speed, and hidden FX spread better than the other options shown. The main hidden cost to watch is the exchange-rate markup, which can quietly outweigh the posted fee.`;
    state.aiLoading = false;
    render();
  });

  const backBtn = document.getElementById('back-btn');
  if(backBtn) backBtn.addEventListener('click', ()=>{ state.step=1; render(); });

  document.querySelectorAll('.result-card').forEach(card => {
    card.addEventListener('click', ()=>{
      state.selected = Number(card.dataset.idx);
      render();
    });
  });

  const copySetupBtn = document.getElementById('copy-setup-btn');
  if(copySetupBtn) copySetupBtn.addEventListener('click', ()=>{
    navigator.clipboard.writeText(state.shareURL).catch(()=>{});
    copySetupBtn.textContent = 'Copied! ✓';
    setTimeout(()=>{ copySetupBtn.textContent = 'Copy link'; }, 1800);
  });

  const receiptBtn = document.getElementById('receipt-btn');
  if(receiptBtn) receiptBtn.addEventListener('click', ()=>{ state.step=4; render(); });

  const backRes = document.getElementById('back-results-btn');
  if(backRes) backRes.addEventListener('click', ()=>{ state.step=3; render(); });

  const shareBtn = document.getElementById('share-btn');
  if(shareBtn) shareBtn.addEventListener('click', ()=>{
    const q = state.quotes[state.selected||0];
    const cor = CORRIDORS[state.form.corridor];
    const fxLoss = q.fxSpread*Number(state.form.amount);
    const baseCurrency = state.form.corridor.startsWith('UK') ? 'GBP' : 'USD';
    const sendSymbol = baseCurrency === 'GBP' ? '£' : '$';
    const txt = `RemitRoute Receipt
${sendSymbol}${state.form.amount} ${baseCurrency} → ${cor.to} via ${q.provider}
Recipient gets: ${cor.symbol}${Math.round(q.payout).toLocaleString()} ${cor.currency}
Fees: $${q.fee.toFixed(2)} | FX spread: $${fxLoss.toFixed(2)} | Total lost: $${(q.fee+fxLoss).toFixed(2)}
Delivery: ${q.speed}
Share link: ${state.shareURL}
Generated by RemitRoute`;
    navigator.clipboard.writeText(txt).catch(()=>{});
    shareBtn.textContent = 'Copied! ✓';
    setTimeout(()=>{ shareBtn.textContent = 'Copy receipt text'; }, 2000);
  });
}

// Init
loadStateFromURL();
syncShareURL();
refreshLiveRates().finally(()=>render());
</script>
</body>
</html>
